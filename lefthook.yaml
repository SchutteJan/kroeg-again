#   https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: format
      run: pnpx oxfmt --check "{staged_files}"
    - name: lint
      run: pnpx oxlint --fix "{staged_files}"
    - name: "turbo: build + test + type-check"
      run: pnpx turbo run --no-daemon build types:check test
      glob: "{*.ts,*.tsx,tsconfig.json}"
